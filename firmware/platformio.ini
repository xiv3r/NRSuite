; 
; nrcap32 - PlatformIO build configuration
; Targets: ESP32-C3, ESP32-C6, ESP32-S3, ESP32-S2
; All boards use native USB CDC - no external USB-UART chip required.
;
; Cross-compile all targets for release:
;   pio run                        (builds all envs)
;   pio run -e esp32-c3-supermini  (single target)
;
; Flash a specific board:
;   pio run -e esp32-c3-supermini --target upload
; 

[platformio]
default_envs = esp32-c3-supermini

; Shared platform (Bruce IDF 5.5 - required for raw 802.11 injection)
[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20260123-153546.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    ESP32Async/AsyncTCP @ ^3.3.2    
    ESP32Async/ESPAsyncWebServer @ ^3.6.0

; Shared build flags (all native USB CDC boards)
extra_scripts = post:merge_script.py
[common_flags]
build_flags =
    ; Native USB CDC - routes Serial to USB, not UART pins
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; Arduino autostart (critical - without this loop() never runs)
    -DCONFIG_AUTOSTART_ARDUINO=1

    ; Raw 802.11 - required for promiscuous mode + frame injection
    -DCONFIG_ESP_WIFI_SOFTAP_SUPPORT=1
    -DCONFIG_ESP_WIFI_ENABLE_WPA2=1
    -DCONFIG_ESP_WIFI_ENABLE_SNIFFER=1
    -DENABLE_OLED=1

    ; Size optimizations
    -ffunction-sections
    -fdata-sections
    -Os
    -Wl,--gc-sections
    -Wl,--allow-multiple-definition

    ; Build identity (override for tagged releases)
    -DGIT_COMMIT_HASH='"dev"'

    ; Debug level: 0=none 1=error 2=warn 3=info 4=debug 5=verbose
    -DCORE_DEBUG_LEVEL=0

    ; Uncomment for LTO (smaller binary, slower build, can hide bugs)
    ; -flto

; 
; ESP32-C3 SuperMini (UNTESTED)
; Native USB CDC, single-core RISC-V, 400KB SRAM, 4MB flash
; VID:PID -> 303A:1001
; 
[env:esp32-c3-supermini]
extends           = base, common_flags
board             = esp32-c3-devkitm-1
board_build.mcu   = esp32c3
board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.filesystem = littlefs
board_build.partitions = esp32c3_supermini_partitions.csv
build_flags =
    ${common_flags.build_flags}
    -DBOARD_HAS_PSRAM=0
    -DCHIP_NAME='"ESP32-C3"'

; 
; ESP32-S3/SuperMini (UNTESTED)
; Native USB CDC + OTG, dual-core Xtensa LX7, up to 512KB SRAM
; Boards with PSRAM: set BOARD_HAS_PSRAM=1 and uncomment -mfix-esp32-psram-cache-issue
; VID:PID -> 303A:1001
; 
[env:esp32-s3]
extends           = base, common_flags
board             = esp32-s3-devkitc-1
board_build.mcu   = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.filesystem = spiffs

; Add this line to fix the bootloop:
board_build.partitions = huge_app.csv 

build_flags =
    ${common_flags.build_flags}
    -DBOARD_HAS_PSRAM=0
    -DCHIP_NAME='"ESP32-S3"'
    -DCONFIG_ESP_SYSTEM_USE_SPIRAM=0
; 
; ESP32-S2 (UNTESTED)
; Native USB CDC, single-core Xtensa LX7, no BLE
; VID:PID -> 303A:0002
; 
[env:esp32-s2]
extends           = base, common_flags
board             = esp32-s2-saola-1
board_build.mcu   = esp32s2
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_upload.flash_size = 4MB
build_flags =
    ${common_flags.build_flags}
    -DBOARD_HAS_PSRAM=0
    -DCHIP_NAME='"ESP32-S2"'


; 
; Classic ESP32
; Requires external USB-to-UART bridge (CP2102 / CH340) on the dev board.
;
[env:esp32-devkit]
extends           = base, common_flags
board             = esp32dev
board_build.mcu   = esp32
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv

build_flags =
    ${common_flags.build_flags}
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    
    -DBOARD_HAS_PSRAM=0
    -DCHIP_NAME='"ESP32"'
    -Wl,--wrap=ieee80211_raw_frame_sanity_check
    -DCHIP_NAME='"ESP32"'